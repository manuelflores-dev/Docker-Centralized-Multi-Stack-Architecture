services:

  # ── MARIADB CENTRAL ───────────
  db:
    image: mariadb:10.11
    container_name: ${MARIADB_CONTAINER}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: America/Mexico_City
    ports:
      - "127.0.0.1:${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker-config/db_conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./logs/mariadb:/var/log/mysql
    networks:
      - custom-network
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PHP API REST (Laravel PHP 7.3) ─────────────────────────────────────────
  php-apirest:
    build:
      context: ./docker-config/php/apirest
      dockerfile: Dockerfile
    container_name: php_apirest
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/apirest:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  # ── PHP DICOTECH (Yii2 - PHP 7.2) ───────────────────────────────────────────
  php-dicotech:
    build:
      context: ./docker-config/php/dicotech
      dockerfile: Dockerfile
    container_name: php_dicotech
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/dicotech:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "local.dicotech.com.mx:host-gateway"
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      php-apirest:
        condition: service_started

  # ── PHP FICHAS-DICOTECH (PHP 7.2) ───────────────────────────────────────────
  php-fichas-dicotech:
    build:
      context: ./docker-config/php/fichas-dicotech
      dockerfile: Dockerfile
    container_name: php_fichas_dicotech
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/fichas-dicotech:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "fichas.dicotech.local.sagd.com.mx:host-gateway"
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      php-apirest:
        condition: service_started

  # ── PHP SAGD (ZEND - PHP 7.2) ───────────────────────────────────────────
  php-sagd:
    build:
      context: ./docker-config/php/sagd
      dockerfile: Dockerfile
    container_name: php_sagd
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/sagd:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "amazon.local.sagd.com.mx:host-gateway"
      - "arboledas.local.sagd.com.mx:host-gateway"
      - "cdmx.local.sagd.com.mx:host-gateway"
      - "dicoags2.local.sagd.com.mx:host-gateway"
      - "dropship.local.sagd.com.mx:host-gateway"
      - "gdl.local.sagd.com.mx:host-gateway"
      - "internet.local.sagd.com.mx:host-gateway"
      - "leon2.local.sagd.com.mx:host-gateway"
      - "santafe.local.sagd.com.mx:host-gateway"
      - "zacatecas.local.sagd.com.mx:host-gateway"
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      php-apirest:
        condition: service_started

  # ── PHP ZEGUCOM (Yii2 - PHP 7.2) ───────────────────────────────────────────
  php-zegucom:
    build:
      context: ./docker-config/php/zegucom
      dockerfile: Dockerfile
    container_name: php_zegucom
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/zegucom:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "responsivo.local.zegucom.com.mx:host-gateway"
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      php-apirest:
        condition: service_started

  # ── PHP WAREHOUSE (Yii2 - PHP 7.2) ───────────────────────────────────────────
  php-warehouse:
    build:
      context: ./docker-config/php/warehouse
      dockerfile: Dockerfile
    container_name: php_warehouse
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    volumes:
      - ./projects:/var/www/html
      - ./logs/php/warehouse:/var/log/php
    networks:
      - custom-network
    extra_hosts:
      - "warehouse.local.sagd.com.mx:host-gateway"
      - "local.apirest.mx:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      php-apirest:
        condition: service_started

  # ── SERVIDOR NGINX CENTRALIZADO ─────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: ${NGINX_CONTAINER}
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker-config/nginx:/etc/nginx/conf.d:ro
      - ./projects:/var/www/html
      - ./logs/nginx:/var/log/nginx
    networks:
      - custom-network
    depends_on:
      - php-apirest

networks:
  custom-network:
    name: ${DOCKER_NETWORK_NAME}
    driver: bridge

volumes:
  mariadb_data:
