# API REST
server {
    listen 80;
    server_name local.apirest.mx;

    root /var/www/html/apirest/public;
    index index.php index.html;
    charset utf-8;

    access_log /var/log/nginx/apirest_access.log;
    error_log  /var/log/nginx/apirest_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php_apirest:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. {
        deny all;
    }
}

